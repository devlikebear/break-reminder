work_duration_min: 50
break_duration_min: 10
idle_threshold_sec: 120
natural_break_sec: 300
work_days: [1, 2, 3, 4, 5]
work_start_hour: 9
work_start_minute: 0
work_end_hour: 18
work_end_minute: 0
voice: "Yuna"
tts_engine: "say"
tts_model: "KittenML/kitten-tts-nano-0.8"
tts_python_cmd: "python3"

# Gemini 3.1 Flash TTS (optional — requires Google AI API access)
# Messages are sent to Google's servers. Uncomment and set API key to enable.
# tts_engine: "gemini"
# tts_model: "gemini-3.1-flash-tts-preview"
# voice: "Zephyr"        # Gemini voices: Zephyr, Puck, Kore, Charon, Leda, ...
# tts_api_key: ""        # or export GEMINI_API_KEY env var instead

notifications_enabled: true
tts_enabled: true
break_activities_enabled: true
ai_enabled: false
ai_cli: "claude"
break_screen_mode: "ask"
max_log_lines: 1000
check_interval_sec: 60
